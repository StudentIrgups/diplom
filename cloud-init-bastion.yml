#cloud-config
users:
  - name: ubuntu
    groups: sudo
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - ${ssh_public_key}
package_update: true     
packages: ${req_packages}

write_files:
  - path: /tmp/id_rsa
    permissions: '0600'
    encoding: b64
    content: ${base64encode(ssh_private_key)}

  - path: /tmp/hosts.ini
    permissions: '0644'
    encoding: b64
    content: ${base64encode(tpl_hosts)}

  - path: /tmp/extra.yml
    permissions: '0644'
    encoding: b64
    content: ${file_extra}

  - path: /tmp/kubespray.sh
    permissions: '0777'
    encoding: b64
    content: ${sh_kubespray}

  - path: /tmp/proxy
    permissions: '0644'
    encoding: b64
    content: ${base64encode(tpl_proxy)} 

  - path: /home/ubuntu/.Dockerfile
    permissions: '0644'
    encoding: b64
    content:  ${base64encode(docker_nginx)}    

  - path: /home/ubuntu/nginx-app.sh
    permissions: '0777'
    encoding: b64
    content:  ${base64encode(sh_app)}

  - path: /home/ubuntu/nginx-app.yml
    permissions: '0644'
    encoding: b64
    content: ${yml_app}  

  - path: /tmp/kube-prometheus.sh
    permissions: '0777'
    encoding: b64
    content: ${sh_prometheus}

  - path: /tmp/grafana-node-port.yml
    permissions: '0644'
    encoding: b64
    content: ${yml_grafana_node_port}

  - path: /home/ubuntu/authorized-key-diplom.json
    permissions: '0600'
    encoding: b64
    content: ${authorized_key_diplom}  

  - path: /home/ubuntu/credentials
    permissions: '0600'
    encoding: b64
    content: ${s3_key}      

  - path: /home/ubuntu/id_rsa.pub
    permissions: '0600'
    encoding: b64
    content: ${base64encode(ssh_public_key)}

  - path: /home/ubuntu/atlantis.sh
    permissions: '0777'
    encoding: b64
    content: ${sh_atlantis}    

  - path: /home/ubuntu/terraformrc
    permissions: '0644'
    encoding: b64
    content: ${base64encode(terraformrc)}

  - path: /opt/atlantis/vars.yml
    content: |
      ---
      k8s_namespace: "${k8s_namespace}"
      atlantis_version: "${atlantis_version}"
      atlantis_image: "ghcr.io/runatlantis/atlantis:${atlantis_version}"
      atlantis_replicas: ${atlantis_replicas}
      atlantis_port: ${atlantis_port}
      
      atlantis_resources:
        requests:
          memory: "${atlantis_memory_request}"
          cpu: "${atlantis_cpu_request}"
        limits:
          memory: "${atlantis_memory_limit}"
          cpu: "${atlantis_cpu_limit}"
      
      atlantis_github_user: "${github_user}"
      atlantis_repo_allowlist: |
        ${indent(4, repo_allowlist)}
      
      ingress_enabled: ${ingress_enabled}
      ingress_host: "${ingress_host}"
      ingress_class: "${ingress_class}"
    owner: ubuntu:ubuntu
    permissions: '0644'

  # Секреты
  - path: /opt/atlantis/vault.yml
    content: |
      ---
      atlantis_github_token: "${github_token}"
      atlantis_webhook_secret: "${webhook_secret}"
    owner: ubuntu:ubuntu
    permissions: '0600'

  # Плейбук Ansible
  - path: /opt/atlantis/deploy-atlantis.yml
    content: |
      ---
      - name: Deploy Atlantis to Kubernetes
        hosts: localhost
        gather_facts: yes
        vars_files:
          - /opt/atlantis/vars.yml
          - /opt/atlantis/vault.yml
        
        tasks:
          - name: Create manifests directory
            file:
              path: /tmp/atlantis-manifests
              state: directory
          
          - name: Deploy namespace
            copy:
              dest: /tmp/atlantis-manifests/namespace.yaml
              content: |
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: {{ k8s_namespace }}
            args:
              apply: kubectl apply -f /tmp/atlantis-manifests/namespace.yaml
          
          - name: Deploy secrets
            copy:
              dest: /tmp/atlantis-manifests/secrets.yaml
              content: |
                apiVersion: v1
                kind: Secret
                metadata:
                  name: atlantis-secrets
                  namespace: {{ k8s_namespace }}
                type: Opaque
                stringData:
                  ATLANTIS_GH_TOKEN: "{{ atlantis_github_token }}"
                  ATLANTIS_GH_WEBHOOK_SECRET: "{{ atlantis_webhook_secret }}"
            args:
              apply: kubectl apply -f /tmp/atlantis-manifests/secrets.yaml
          
          - name: Deploy ConfigMap
            copy:
              dest: /tmp/atlantis-manifests/configmap.yaml
              content: |
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: atlantis-repo-config
                  namespace: {{ k8s_namespace }}
                data:
                  repos.yaml: |
                    repos:
                    - id: /.*/
                      apply_requirements: [mergeable, approved]
                      workflow: default
            args:
              apply: kubectl apply -f /tmp/atlantis-manifests/configmap.yaml
          
          - name: Deploy Atlantis
            copy:
              dest: /tmp/atlantis-manifests/deployment.yaml
              content: |
                apiVersion: v1
                kind: ServiceAccount
                metadata:
                  name: atlantis
                  namespace: {{ k8s_namespace }}
                
                ---
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: atlantis
                  namespace: {{ k8s_namespace }}
                spec:
                  replicas: {{ atlantis_replicas }}
                  selector:
                    matchLabels:
                      app: atlantis
                  template:
                    metadata:
                      labels:
                        app: atlantis
                    spec:
                      serviceAccountName: atlantis
                      containers:
                      - name: atlantis
                        image: {{ atlantis_image }}
                        ports:
                        - containerPort: {{ atlantis_port }}
                        env:
                        - name: ATLANTIS_GH_USER
                          value: "{{ atlantis_github_user }}"
                        - name: ATLANTIS_GH_TOKEN
                          valueFrom:
                            secretKeyRef:
                              name: atlantis-secrets
                              key: ATLANTIS_GH_TOKEN
                        - name: ATLANTIS_GH_WEBHOOK_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: atlantis-secrets
                              key: ATLANTIS_GH_WEBHOOK_SECRET
                        - name: ATLANTIS_REPO_ALLOWLIST
                          value: |
                            {{ atlantis_repo_allowlist | indent(28) }}
                        - name: ATLANTIS_PORT
                          value: "{{ atlantis_port }}"
                        - name: ATLANTIS_DATA_DIR
                          value: /atlantis-data
                        volumeMounts:
                        - name: data
                          mountPath: /atlantis-data
                        - name: config
                          mountPath: /etc/atlantis
                        resources:
                          requests:
                            memory: {{ atlantis_resources.requests.memory }}
                            cpu: {{ atlantis_resources.requests.cpu }}
                          limits:
                            memory: {{ atlantis_resources.limits.memory }}
                            cpu: {{ atlantis_resources.limits.cpu }}
                        livenessProbe:
                          httpGet:
                            path: /healthz
                            port: {{ atlantis_port }}
                          initialDelaySeconds: 30
                        readinessProbe:
                          httpGet:
                            path: /healthz
                            port: {{ atlantis_port }}
                          initialDelaySeconds: 10
                      volumes:
                      - name: data
                        emptyDir: {}
                      - name: config
                        configMap:
                          name: atlantis-repo-config
            args:
              apply: kubectl apply -f /tmp/atlantis-manifests/deployment.yaml
          
          - name: Deploy Service
            copy:
              dest: /tmp/atlantis-manifests/service.yaml
              content: |
                apiVersion: v1
                kind: Service
                metadata:
                  name: atlantis
                  namespace: {{ k8s_namespace }}
                spec:
                  ports:
                  - port: 80
                    targetPort: {{ atlantis_port }}
                  selector:
                    app: atlantis
            args:
              apply: kubectl apply -f /tmp/atlantis-manifests/service.yaml
          
          - name: Deploy Ingress
            copy:
              dest: /tmp/atlantis-manifests/ingress.yaml
              content: |
                apiVersion: networking.k8s.io/v1
                kind: Ingress
                metadata:
                  name: atlantis
                  namespace: {{ k8s_namespace }}
                  annotations:
                    nginx.ingress.kubernetes.io/ssl-redirect: "false"
                    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
                spec:
                  ingressClassName: {{ ingress_class }}
                  rules:
                  - host: {{ ingress_host }}
                    http:
                      paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: atlantis
                            port:
                              number: 80
                      - path: /events
                        pathType: Prefix
                        backend:
                          service:
                            name: atlantis
                            port:
                              number: 80
            args:
              apply: kubectl apply -f /tmp/atlantis-manifests/ingress.yaml
            when: {{ ingress_enabled }}
          
          - name: Wait for Atlantis
            command: kubectl wait --for=condition=ready pod -l app=atlantis -n {{ k8s_namespace }} --timeout=300s
          
          - name: Show status
            debug:
              msg: |
                ✅ Atlantis deployed!
                kubectl get pods -n {{ k8s_namespace }}
                kubectl logs -f deployment/atlantis -n {{ k8s_namespace }}
    owner: ubuntu:ubuntu
    permissions: '0644'

  # Скрипт запуска
  - path: /opt/atlantis/deploy.sh
    content: |
      #!/bin/bash
      set -e
      echo "🚀 Deploying Atlantis..."
      cd /opt/atlantis
      ansible-playbook deploy-atlantis.yml
      echo "✅ Done!"
    owner: ubuntu:ubuntu
    permissions: '0755'

  # Systemd сервис
  - path: /etc/systemd/system/atlantis-deploy.service
    content: |
      [Unit]
      Description=Atlantis Deploy
      After=network.target
      
      [Service]
      Type=oneshot
      User=ubuntu
      WorkingDirectory=/opt/atlantis
      ExecStart=/opt/atlantis/deploy.sh
      StandardOutput=journal
      StandardError=journal
      
      [Install]
      WantedBy=multi-user.target
    owner: root:root
    permissions: '0644'


runcmd:
  - sudo chown -R ubuntu:ubuntu /home/ubuntu
  - sudo -u ubuntu cp /etc/skel/.bashrc /etc/skel/.profile /home/ubuntu
  - sudo cp /tmp/id_rsa /home/ubuntu/.ssh/id_rsa; sudo chown ubuntu:ubuntu /home/ubuntu/.ssh/id_rsa
  - sudo cp /tmp/proxy /etc/nginx/sites-available/proxy
  - sudo ln -s /etc/nginx/sites-available/proxy /etc/nginx/sites-enabled/proxy  
  - sudo usermod -aG docker ubuntu
  - newgrp docker

  - [ sudo, -u, ubuntu, -i, bash, -c, "/tmp/kubespray.sh ${name_control_node}" ]   
  - [ sudo, -u, ubuntu, -i, bash, -c, "/home/ubuntu/nginx-app.sh" ]    
  - [ sudo, -u, ubuntu, -i, bash, -c, "/tmp/kube-prometheus.sh" ]
  - [ sudo, -u, ubuntu, -i, bash, -c, "GITHUB_TOKEN=${github_token} PUBLIC_IP=${public_ip} GITHUB_USERNAME=${github_username} REPOS=${repos} CLOUD_ID=${cloud_id} FOLDER_ID=${folder_id} DB_HOST=${db_host} DB_USER=${db_user} DB_PASSWORD=${db_password} DB_NAME=${db_name} MYSQL_ROOT_PASSWORD=${mysql_root_password} /home/ubuntu/atlantis.sh" ]